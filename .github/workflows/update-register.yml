name: Update Register Data

on:
  schedule:
    # Weekdays: every hour from 7am to 7pm UTC (covers UK working hours)
    - cron: '0 7-19 * * 1-5'
    # Weekends: every 6 hours (catch surprise publishes)
    - cron: '0 0,6,12,18 * * 0,6'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Check for new register data
        run: python scripts/update_data.py

      - name: Commit and push if updated
        if: hashFiles('.data_updated') != ''
        run: |
          git config user.name "MPSJ Auto-Updater"
          git config user.email "mpsj-bot@users.noreply.github.com"
          git add -A
          # Remove the flag file before committing
          rm -f .data_updated
          git add -A
          PUBLISH_DATE=$(cat data/last_register.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["published_date"])')
          git commit -m "Auto-update: Register published ${PUBLISH_DATE}"
          git push
          echo "PUBLISH_DATE=${PUBLISH_DATE}" >> $GITHUB_ENV

      - name: Create notification issue
        if: env.PUBLISH_DATE != ''
        uses: actions/github-script@v7
        with:
          script: |
            const date = process.env.PUBLISH_DATE;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Register updated: ${date}`,
              body: `The Register of Members' Financial Interests published on **${date}** has been automatically downloaded and processed.\n\nThe site will redeploy on Render shortly.\n\n[View the register →](https://members.parliament.uk/members/commons/interests/publications)`,
              labels: ['auto-update']
            });
